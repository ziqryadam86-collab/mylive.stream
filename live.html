<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Redirector</title>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding-top: 100px; 
            background: #121212; 
            color: #ffffff; 
        }
        .btn { 
            display: inline-block; 
            padding: 12px 24px; 
            background: #ff8800; 
            color: white; 
            text-decoration: none; 
            border-radius: 6px; 
            font-weight: bold; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>

    <h2>Membuka VLC Player...</h2>
    <p>Jika aplikasi VLC tidak dilancarkan secara automatik, klik butang di bawah:</p>
    
    <a id="vlcLink" class="btn" href="#">BUKA DI VLC</a>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const streamCode = urlParams.get('stream');

    // Alamat stream m3u8 nbcuni yang sebenar
    const realStreamUrl = "https://xumo-drct-nbcnn-ir8ze.fast.nbcuni.com/live/master.m3u8";

    if (streamCode === 'afjav173718j9') {
        // Menggunakan skema vlc:// untuk memaksa Android membuka aplikasi VLC terus
        const vlcIntent = "vlc://" + realStreamUrl;
        
        // Sediakan pautan pada butang sebagai backup
        document.getElementById('vlcLink').href = vlcIntent;
        
        // Panggil VLC secara automatik sekelip mata
        window.location.href = vlcIntent;
    } else {
        document.body.innerHTML = "<h3>Stream tidak dijumpai atau kod salah.</h3>";
    }
</script>
</body>
</html>
